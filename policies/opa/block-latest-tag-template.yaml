apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblocklatesttag
spec:
  crd:
    spec:
      names:
        kind: K8sBlockLatestTag
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblocklatesttag

        violation[{"msg": msg}] {
          container := input.review.object.spec.template.spec.containers[_]
          endswith(container.image, ":latest")
          msg := sprintf(
            "Container '%v' uses the ':latest' tag ('%v'). Images must be pinned to an explicit, immutable version tag so deployments are reproducible and rollbacks are predictable.",
            [container.name, container.image]
          )
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.template.spec.containers[_]
          not contains(container.image, ":")
          msg := sprintf(
            "Container '%v' has no explicit tag ('%v'), which implicitly resolves to ':latest'. Images must be pinned to an explicit version tag.",
            [container.name, container.image]
          )
        }
